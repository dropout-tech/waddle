<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>方向 A — 暖紙陶瓷</title>
<style>
  :root {
    --bg: oklch(0.975 0.008 85);
    --fg: oklch(0.28 0.025 55);
    --card: oklch(0.995 0.003 85);
    --border: oklch(0.9 0.015 85);
    --terra: oklch(0.68 0.14 35);
    --muted: oklch(0.5 0.02 55);
    --sans: 'Noto Sans TC', -apple-system, 'PingFang TC', 'Helvetica Neue', sans-serif;
    --mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1440px; height: 900px; overflow: hidden; }
  body {
    font-family: var(--sans);
    color: var(--fg);
    /* 暖紙面：中央極淡的赤陶暈染，像陶釉的溫度 */
    background:
      radial-gradient(1100px 760px at 50% 36%,
        color-mix(in oklch, var(--terra) 5%, var(--bg)),
        var(--bg) 72%);
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column;
  }

  /* ---------- Header ---------- */
  .header {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 30px 40px 0;
  }
  .status-label {
    font-size: 11px; letter-spacing: 0.22em; font-weight: 500;
    color: color-mix(in oklch, var(--terra) 78%, var(--fg));
  }
  .now-clock {
    font-family: var(--mono); font-size: 13px; color: var(--muted);
    margin-top: 6px; font-variant-numeric: tabular-nums;
  }
  .header-right { display: flex; align-items: center; gap: 18px; }
  .pomo-dots { display: flex; align-items: center; gap: 7px; }
  .pomo-dots .dot { width: 6px; height: 6px; border-radius: 99px; }
  .pomo-dots .filled { background: var(--terra); }
  .pomo-dots .empty  { background: color-mix(in oklch, var(--terra) 18%, var(--border)); }
  .ghost-btn {
    width: 40px; height: 40px; border-radius: 99px;
    display: grid; place-items: center;
    color: color-mix(in oklch, var(--fg) 55%, var(--bg));
  }
  .ghost-btn svg { width: 17px; height: 17px; }
  .btn-row { display: flex; gap: 2px; }

  /* ---------- Center ---------- */
  .center {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .mode-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 15px; border-radius: 99px;
    background: color-mix(in oklch, var(--card) 72%, transparent);
    border: 1px solid color-mix(in oklch, var(--terra) 30%, var(--border));
    margin-bottom: 40px;
    font-size: 13px; color: color-mix(in oklch, var(--fg) 85%, var(--bg));
  }
  .mode-chip .chip-dot { width: 6px; height: 6px; border-radius: 99px; background: var(--terra); }

  .ring-wrap { position: relative; width: 340px; height: 340px; }
  .ring-wrap svg.ring { transform: rotate(-90deg); }
  .digits-box {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .digits {
    font-family: var(--mono); font-weight: 400;
    font-size: 84px; line-height: 1; letter-spacing: -0.045em;
    font-variant-numeric: tabular-nums;
    color: var(--fg);
  }
  .meta-line {
    margin-top: 30px; font-size: 12.5px; color: var(--muted);
    font-variant-numeric: tabular-nums; letter-spacing: 0.02em;
    display: flex; gap: 9px; align-items: center;
  }
  .meta-line .sep { color: color-mix(in oklch, var(--muted) 40%, var(--bg)); }

  /* ---------- Footer ---------- */
  .footer {
    display: flex; flex-direction: column; align-items: center;
    gap: 18px; padding-bottom: 34px;
  }
  .pause-btn {
    width: 64px; height: 64px; border-radius: 99px;
    background: var(--card);
    border: 1px solid var(--border);
    display: grid; place-items: center;
    color: color-mix(in oklch, var(--fg) 72%, var(--bg));
    box-shadow:
      0 1px 2px oklch(0.28 0.025 55 / 0.05),
      0 8px 22px oklch(0.28 0.025 55 / 0.07);
  }
  .pause-btn svg { width: 22px; height: 22px; }
  .bgm-pill {
    display: inline-flex; align-items: center; gap: 9px;
    padding: 8px 16px 8px 12px; border-radius: 99px;
    background: color-mix(in oklch, var(--card) 62%, transparent);
    border: 1px solid color-mix(in oklch, var(--border) 60%, transparent);
    font-size: 12px; color: color-mix(in oklch, var(--fg) 72%, var(--bg));
  }
  .bgm-pill svg { width: 14px; height: 14px; color: var(--muted); }
  .bgm-pill .chev { width: 15px; height: 15px; }

  /* ---------- 雪丘與企鵝（右下三角構圖） ---------- */
  .mound {
    position: absolute; right: 0; bottom: 0; width: 560px; height: 190px;
    pointer-events: none;
  }
  .penguin {
    position: absolute; right: 128px; bottom: 96px;
    width: 58px; pointer-events: none;
  }
</style>
</head>
<body>

  <!-- 雪丘：比紙面略亮一階的暖白，柔和地從右緣升起 -->
  <svg class="mound" viewBox="0 0 560 190" preserveAspectRatio="none" aria-hidden="true">
    <defs>
      <linearGradient id="moundFade" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="oklch(0.998 0.003 85)" stop-opacity="1"/>
        <stop offset="100%" stop-color="oklch(0.988 0.005 85)" stop-opacity="0.65"/>
      </linearGradient>
    </defs>
    <path d="M 560 40 Q 430 22 330 72 Q 230 122 100 152 Q 40 166 0 190 L 560 190 Z" fill="url(#moundFade)"/>
    <!-- 丘頂的一道柔和輪廓線，讓地面「在那裡」 -->
    <path d="M 560 40 Q 430 22 330 72 Q 230 122 100 152 Q 40 166 0 190" fill="none"
          stroke="oklch(0.88 0.02 80)" stroke-opacity="0.55" stroke-width="1.5"/>
  </svg>

  <!-- 企鵝腳下的柔影 -->
  <div style="position:absolute; right:120px; bottom:92px; width:76px; height:12px; border-radius:99px;
              background: radial-gradient(closest-side, oklch(0.45 0.03 55 / 0.14), transparent); pointer-events:none"></div>

  <!-- Waddle：安靜地站在雪丘上，縮小、不搶戲 -->
  <svg class="penguin" viewBox="-30 -45 60 82" aria-hidden="true">
    <path d="M 0 -30 C -3 -42, -18 -42, -22 -30 C -28 -20, -28 0, -22 18 C -18 26, -10 30, 0 30 C 10 30, 18 26, 22 18 C 28 0, 28 -20, 22 -30 C 18 -42, 3 -42, 0 -30 Z"
          fill="color-mix(in oklch, oklch(0.32 0.03 55) 88%, transparent)"/>
    <path d="M -10 -8 C -12 0, -12 14, -8 22 C -4 26, 4 26, 8 22 C 12 14, 12 0, 10 -8 C 6 -12, -6 -12, -10 -8 Z"
          fill="oklch(0.99 0.004 85)"/>
    <circle cx="-6" cy="-15" r="1.7" fill="oklch(0.98 0.005 85)"/>
    <circle cx="6" cy="-15" r="1.7" fill="oklch(0.98 0.005 85)"/>
    <circle cx="-5.6" cy="-15" r="0.9" fill="oklch(0.2 0.02 55)"/>
    <circle cx="6.4" cy="-15" r="0.9" fill="oklch(0.2 0.02 55)"/>
    <path d="M -3 -10 L 3 -10 L 0 -6 Z" fill="oklch(0.78 0.16 60)"/>
    <ellipse cx="-7" cy="32" rx="4.5" ry="2" fill="oklch(0.78 0.16 60)"/>
    <ellipse cx="7" cy="32" rx="4.5" ry="2" fill="oklch(0.78 0.16 60)"/>
  </svg>

  <div class="header">
    <div>
      <div class="status-label">專注中</div>
      <div class="now-clock">現在 14:37</div>
    </div>
    <div class="header-right">
      <div class="pomo-dots" title="今日已完成 2 顆番茄">
        <span class="dot filled"></span><span class="dot filled"></span>
        <span class="dot empty"></span><span class="dot empty"></span>
      </div>
      <div class="btn-row">
        <div class="ghost-btn" title="縮小到角落">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/>
            <path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/>
          </svg>
        </div>
        <div class="ghost-btn" title="長按結束">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
            <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <div class="center">
    <div class="mode-chip"><span class="chip-dot"></span>短專注</div>

    <div class="ring-wrap">
      <svg class="ring" width="340" height="340" viewBox="0 0 340 340">
        <!-- 軌道 -->
        <circle cx="170" cy="170" r="152" fill="none"
                stroke="color-mix(in oklch, var(--terra) 19%, oklch(0.99 0.004 85))" stroke-width="9"/>
        <!-- 5 分鐘刻度（略過 12 點鐘位置） -->
        <circle cx="277.5" cy="62.5"  r="2.5" fill="color-mix(in oklch, var(--terra) 32%, var(--bg))"/>
        <circle cx="277.5" cy="277.5" r="2.5" fill="color-mix(in oklch, var(--terra) 32%, var(--bg))"/>
        <circle cx="170"   cy="322"   r="2.5" fill="color-mix(in oklch, var(--terra) 32%, var(--bg))"/>
        <circle cx="62.5"  cy="277.5" r="2.5" fill="color-mix(in oklch, var(--terra) 32%, var(--bg))"/>
        <circle cx="18"    cy="170"   r="2.5" fill="color-mix(in oklch, var(--terra) 32%, var(--bg))"/>
        <circle cx="62.5"  cy="62.5"  r="2.5" fill="color-mix(in oklch, var(--terra) 32%, var(--bg))"/>
        <circle cx="170"   cy="18"    r="2.5" fill="color-mix(in oklch, var(--terra) 32%, var(--bg))"/>
        <!-- 進度弧：唯一的主角色，62% -->
        <circle cx="170" cy="170" r="152" fill="none"
                stroke="var(--terra)" stroke-width="9" stroke-linecap="round"
                stroke-dasharray="955.04" stroke-dashoffset="362.92"/>
      </svg>
      <div class="digits-box">
        <div class="digits">14:45</div>
      </div>
    </div>

    <div class="meta-line">
      <span>開始於 14:12</span><span class="sep">·</span><span>預計 14:52 結束</span>
    </div>
  </div>

  <div class="footer">
    <div class="pause-btn" title="暫停">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <rect x="6.5" y="4.5" width="4" height="15" rx="1.4"/>
        <rect x="13.5" y="4.5" width="4" height="15" rx="1.4"/>
      </svg>
    </div>
    <div class="bgm-pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8" cy="18" r="4"/><path d="M12 18V2l7 4"/>
      </svg>
      <span>海浪 · 白噪音</span>
      <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" style="color: var(--muted)">
        <path d="m18 15-6-6-6 6"/>
      </svg>
    </div>
  </div>

</body>
</html>
